asyncapi: "2.6.0"

info:
  title: IMMERSA Voice Chat API
  version: "1.0.0"
  description: |
    Real-time voice conversation API powered by Whisper (STT), Groq LLaMA (LLM), and ElevenLabs (TTS).

    ## Typical flow

    ```
    Client                                    Server
      |-- connect ws://host/ws/voice-chat ------>|
      |<-- connection_established ---------------|
      |-- start_session ----------------------->|
      |<-- ack (start_session) ------------------|
      |-- audio_chunk (×N) -------------------->|
      |<-- ack (audio_chunk)  ×N  --------------|
      |-- end_of_utterance -------------------->|
      |<-- ack (end_of_utterance) --------------|
      |<-- final_transcript ---------------------|
      |<-- reply_text_done ----------------------|
      |<-- tts_audio_chunk (×M) ----------------|
      |<-- tts_done -----------------------------|
      |   (repeat from audio_chunk for next turn)|
      |-- close_session ----------------------->|
      |<-- ack (close_session) -----------------|
    ```

    ## Session states
    `CONNECTED` → `LISTENING` → `FINALIZING_TRANSCRIPT` → `GENERATING_REPLY` → `STREAMING_TTS` → `LISTENING` → `CLOSED`

servers:
  production:
    url: wss://immersa-api-voice-chat.run.place
    protocol: wss
    description: Production server (GCP)
  local:
    url: ws://127.0.0.1:8000
    protocol: ws
    description: Local development server

channels:
  /ws/voice-chat:
    description: |
      Single WebSocket channel that handles the full voice conversation lifecycle.
      All messages in both directions are JSON objects identified by a `type` field.
    subscribe:
      summary: Messages the SERVER sends TO the client
      message:
        oneOf:
          - $ref: "#/components/messages/ConnectionEstablished"
          - $ref: "#/components/messages/Ack"
          - $ref: "#/components/messages/FinalTranscript"
          - $ref: "#/components/messages/ReplyTextDone"
          - $ref: "#/components/messages/TtsAudioChunk"
          - $ref: "#/components/messages/TtsDone"
          - $ref: "#/components/messages/Error"
    publish:
      summary: Messages the CLIENT sends TO the server
      message:
        oneOf:
          - $ref: "#/components/messages/StartSession"
          - $ref: "#/components/messages/AudioChunk"
          - $ref: "#/components/messages/EndOfUtterance"
          - $ref: "#/components/messages/CloseSession"

components:
  # ──────────────────────────────────────────
  # CLIENT → SERVER  messages
  # ──────────────────────────────────────────
  messages:
    StartSession:
      name: start_session
      title: Start Session
      summary: >
        Initialise a new conversation session. Must be sent once after the
        connection_established message before any audio is streamed.
      payload:
        $ref: "#/components/schemas/StartSessionPayload"
      examples:
        - name: student-session
          payload:
            type: start_session
            character_id: s1
            sample_rate: 16000
            audio_format: wav

    AudioChunk:
      name: audio_chunk
      title: Audio Chunk
      summary: >
        One chunk of base64-encoded audio. Send as many chunks as needed
        while the user is speaking. The server runs rolling STT every 5 chunks
        to accumulate the transcript internally.
      payload:
        $ref: "#/components/schemas/AudioChunkPayload"
      examples:
        - name: first-chunk
          payload:
            type: audio_chunk
            chunk_index: 0
            audio: "UklGRiQAAABXQVZFZm10IBAAAA..."

    EndOfUtterance:
      name: end_of_utterance
      title: End of Utterance
      summary: >
        Signal that the user has finished speaking. Triggers final STT
        transcription → LLM reply → TTS streaming.
      payload:
        $ref: "#/components/schemas/EndOfUtterancePayload"
      examples:
        - name: end-utterance
          payload:
            type: end_of_utterance

    CloseSession:
      name: close_session
      title: Close Session
      summary: Gracefully terminate the session. The server will send a final ack.
      payload:
        $ref: "#/components/schemas/CloseSessionPayload"
      examples:
        - name: close
          payload:
            type: close_session

    # ──────────────────────────────────────────
    # SERVER → CLIENT  messages
    # ──────────────────────────────────────────
    ConnectionEstablished:
      name: connection_established
      title: Connection Established
      summary: >
        Sent immediately after the WebSocket handshake completes.
        Contains the session_id the client should log for debugging.
      payload:
        $ref: "#/components/schemas/ConnectionEstablishedPayload"
      examples:
        - name: connected
          payload:
            type: connection_established
            session_id: "3f4a1b2c-8d9e-4f5a-b6c7-d8e9f0a1b2c3"
            message: "WebSocket connected successfully"

    Ack:
      name: ack
      title: Acknowledgement
      summary: >
        Generic acknowledgement for client messages. The `event` field mirrors
        the `type` of the message being acknowledged.
      payload:
        $ref: "#/components/schemas/AckPayload"
      examples:
        - name: ack-start-session
          payload:
            type: ack
            event: start_session
            message: "Session started successfully"
            session_id: "3f4a1b2c-8d9e-4f5a-b6c7-d8e9f0a1b2c3"
            character_id: s1
            sample_rate: 16000
            audio_format: wav
            state: LISTENING
        - name: ack-audio-chunk
          payload:
            type: ack
            event: audio_chunk
            message: "Audio chunk received"
            chunk_index: 0
            total_chunks: 1
        - name: ack-end-of-utterance
          payload:
            type: ack
            event: end_of_utterance
            message: "Processing started"
        - name: ack-close-session
          payload:
            type: ack
            event: close_session
            message: "Session closed successfully"

    FinalTranscript:
      name: final_transcript
      title: Final Transcript
      summary: >
        Complete transcription of the full user utterance, emitted after
        end_of_utterance is processed.
      payload:
        $ref: "#/components/schemas/FinalTranscriptPayload"
      examples:
        - name: final
          payload:
            type: final_transcript
            text: "What is hydraulic pressure and how is it measured?"

    ReplyTextDone:
      name: reply_text_done
      title: Reply Text Done
      summary: >
        The character's full text reply from the LLM. Emitted before TTS
        streaming begins — use it to show a text bubble immediately.
      payload:
        $ref: "#/components/schemas/ReplyTextDonePayload"
      examples:
        - name: reply
          payload:
            type: reply_text_done
            text: "Well, hydraulic pressure is the force exerted by a confined fluid..."
            length: 147

    TtsAudioChunk:
      name: tts_audio_chunk
      title: TTS Audio Chunk
      summary: >
        One complete WAV file (base64-encoded) per sentence of the reply.
        ElevenLabs returns MP3 internally; the server decodes it, trims
        trailing silence, and re-encodes each sentence as a self-contained
        WAV PCM_16 file before sending. Play chunks in order as they arrive.
      payload:
        $ref: "#/components/schemas/TtsAudioChunkPayload"
      examples:
        - name: chunk
          payload:
            type: tts_audio_chunk
            chunk_index: 0
            audio: "UklGRiQAAABXQVZFZm10IBAAAA..."

    TtsDone:
      name: tts_done
      title: TTS Done
      summary: >
        Signals that all TTS audio chunks have been sent.
        The session is now back in LISTENING state — ready for the next
        audio_chunk stream.
      payload:
        $ref: "#/components/schemas/TtsDonePayload"
      examples:
        - name: done
          payload:
            type: tts_done

    Error:
      name: error
      title: Error
      summary: >
        Sent when an error occurs at any pipeline stage (invalid JSON, missing
        session, STT/LLM/TTS failure, etc.). The session may still be alive
        after a non-fatal error.
      payload:
        $ref: "#/components/schemas/ErrorPayload"
      examples:
        - name: generic-error
          payload:
            type: error
            message: "Invalid JSON format"
        - name: chunk-error
          payload:
            type: error
            message: "Failed to decode base64 audio"
            chunk_index: 3

  # ──────────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────────
  schemas:
    # --- client payloads ---
    StartSessionPayload:
      type: object
      required: [type, character_id]
      properties:
        type:
          type: string
          enum: [start_session]
        character_id:
          type: string
          description: ID of the character to converse with.
          enum: [s1, s2, p1]
          x-enumDescriptions:
            s1: "Kareem Ali El-Attar — Student, Irrigation Engineering"
            s2: "Morad Hassan El-Shazly — Student, Mechanical Engineering"
            p1: "Amin Saleh Shawky — Professor, Mechanical Engineering"
        sample_rate:
          type: integer
          default: 16000
          description: Audio sample rate in Hz. Must match the WAV files you will send.
          example: 16000
        audio_format:
          type: string
          default: wav
          description: Encoding format of the audio data.
          enum: [wav, wav_base64_chunks, pcm16_base64_chunks]
          example: wav

    AudioChunkPayload:
      type: object
      required: [type, chunk_index, audio]
      properties:
        type:
          type: string
          enum: [audio_chunk]
        chunk_index:
          type: integer
          minimum: 0
          description: Zero-based sequential index of this chunk.
          example: 0
        audio:
          type: string
          format: byte
          description: >
            Base64-encoded audio data for this chunk.
            Format depends on audio_format: WAV bytes for `wav` /
            `wav_base64_chunks`, raw PCM16-LE bytes for `pcm16_base64_chunks`.

    EndOfUtterancePayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [end_of_utterance]

    CloseSessionPayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [close_session]

    # --- server payloads ---
    ConnectionEstablishedPayload:
      type: object
      required: [type, session_id, message]
      properties:
        type:
          type: string
          enum: [connection_established]
        session_id:
          type: string
          format: uuid
          description: Unique identifier for this WebSocket session.
        message:
          type: string
          example: "WebSocket connected successfully"

    AckPayload:
      type: object
      required: [type, event, message]
      description: |
        Generic ack. Extra fields depend on which event is being acknowledged:
        - `start_session` → includes session_id, character_id, sample_rate, audio_format, state
        - `audio_chunk`   → includes chunk_index, total_chunks
        - `end_of_utterance` / `close_session` → no extra fields
      properties:
        type:
          type: string
          enum: [ack]
        event:
          type: string
          enum: [start_session, audio_chunk, end_of_utterance, close_session]
          description: The type of the client message being acknowledged.
        message:
          type: string
        # start_session extras
        session_id:
          type: string
          format: uuid
        character_id:
          type: string
          enum: [s1, s2, p1]
        sample_rate:
          type: integer
        audio_format:
          type: string
        state:
          type: string
          enum:
            [
              CONNECTED,
              LISTENING,
              FINALIZING_TRANSCRIPT,
              GENERATING_REPLY,
              STREAMING_TTS,
              CLOSED,
            ]
        # audio_chunk extras
        chunk_index:
          type: integer
        total_chunks:
          type: integer

    FinalTranscriptPayload:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [final_transcript]
        text:
          type: string
          description: Full transcription of the user's utterance.

    ReplyTextDonePayload:
      type: object
      required: [type, text, length]
      properties:
        type:
          type: string
          enum: [reply_text_done]
        text:
          type: string
          description: The character's complete text reply.
        length:
          type: integer
          description: Character count of the reply text.

    TtsAudioChunkPayload:
      type: object
      required: [type, chunk_index, audio]
      properties:
        type:
          type: string
          enum: [tts_audio_chunk]
        chunk_index:
          type: integer
          minimum: 0
          description: Zero-based sequential index of this audio chunk.
        audio:
          type: string
          format: byte
          description: |
            Base64-encoded WAV file (PCM_16, 44 100 Hz, mono).
            Each chunk is a complete, self-contained WAV for one sentence of
            the reply. ElevenLabs delivers MP3 internally; the server decodes,
            silence-trims, and re-encodes per sentence before sending.

    TtsDonePayload:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [tts_done]

    ErrorPayload:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string
          description: Human-readable error description.
        chunk_index:
          type: integer
          nullable: true
          description: Index of the audio chunk that caused the error, if applicable.
        session_id:
          type: string
          format: uuid
          description: Session ID, included when the error is session-level.
